<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graficadora de Funciones Lineales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app" id="app">
    <header class="header" id="header">
      <h1 class="title">Graficadora Lineal</h1>
      <p class="subtitle"><span class="math">y = m&middot;x + b</span> &mdash; Visualiz&aacute; la recta</p>
    </header>

    <section class="controls" id="controls">
      <div class="control-group">
        <label for="slope">m <span class="label-desc">pendiente</span></label>
        <input type="number" id="slope" value="1" step="0.1">
      </div>
      <div class="control-group">
        <label for="intercept">b <span class="label-desc">intersecci&oacute;n</span></label>
        <input type="number" id="intercept" value="0" step="0.1">
      </div>
      <div class="control-group color-group">
        <label for="lineColor">Color</label>
        <input type="color" id="lineColor" value="#e53e3e">
      </div>
    </section>

    <section class="canvas-wrapper" id="canvasWrapper">
      <canvas id="canvas" width="700" height="500"></canvas>
    </section>

    <footer class="info" id="info">
      <div class="formula" id="formulaDisplay">y = 1.00x + 0.00</div>
      <div class="info-row">
        <span class="info-item">Pendiente (m): <strong id="mDisplay">1.00</strong></span>
        <span class="info-divider"></span>
        <span class="info-item">Ordenada (b): <strong id="bDisplay">0.00</strong></span>
        <span class="info-divider"></span>
        <span class="info-item">
          <span class="color-dot" id="colorDot" style="background:#e53e3e"></span>
          Coord: <strong id="coordDisplay">(0, 0)</strong>
        </span>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
