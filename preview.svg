<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a202c"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="16"/>
  <text x="400" y="48" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="28" font-weight="bold">Graficadora de Funciones Lineales</text>
  <text x="400" y="80" text-anchor="middle" fill="#a0aec0" font-family="sans-serif" font-size="16">y = m·x + b</text>

  <!-- Grid lines -->
  <g stroke="#4a5568" stroke-width="0.5" opacity="0.5">
    <line x1="100" y1="100" x2="700" y2="100"/>
    <line x1="100" y1="150" x2="700" y2="150"/>
    <line x1="100" y1="200" x2="700" y2="200"/>
    <line x1="100" y1="250" x2="700" y2="250"/>
    <line x1="100" y1="300" x2="700" y2="300"/>
    <line x1="100" y1="350" x2="700" y2="350"/>
    <line x1="200" y1="100" x2="200" y2="350"/>
    <line x1="300" y1="100" x2="300" y2="350"/>
    <line x1="400" y1="100" x2="400" y2="350"/>
    <line x1="500" y1="100" x2="500" y2="350"/>
    <line x1="600" y1="100" x2="600" y2="350"/>
  </g>

  <!-- Axes -->
  <g stroke="#718096" stroke-width="2">
    <line x1="100" y1="225" x2="700" y2="225"/>
    <line x1="400" y1="100" x2="400" y2="350"/>
  </g>

  <!-- Line: y = 1.5x - 1 -->
  <line x1="100" y1="337" x2="700" y2="113" stroke="#e53e3e" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow heads -->
  <polygon points="700,225 690,220 690,230" fill="#718096"/>
  <polygon points="400,100 395,110 405,110" fill="#718096"/>

  <text x="695" y="212" fill="#718096" font-family="sans-serif" font-size="14">x</text>
  <text x="410" y="108" fill="#718096" font-family="sans-serif" font-size="14">y</text>
  <text x="405" y="240" fill="#718096" font-family="sans-serif" font-size="12">0</text>

  <!-- Formula card -->
  <rect x="220" y="130" width="160" height="60" rx="8" fill="#e53e3e" opacity="0.15"/>
  <rect x="220" y="130" width="160" height="60" rx="8" fill="none" stroke="#e53e3e" stroke-width="1" opacity="0.4"/>
  <text x="300" y="155" text-anchor="middle" fill="#fc8181" font-family="sans-serif" font-size="14" font-weight="bold">y = 1.50x - 1.00</text>
  <text x="300" y="178" text-anchor="middle" fill="#a0aec0" font-family="sans-serif" font-size="12">m = 1.50 &nbsp; b = -1.00</text>

  <!-- Controls mockup -->
  <rect x="100" y="355" width="600" height="30" rx="6" fill="#4a5568" opacity="0.3"/>
  <rect x="115" y="360" width="160" height="20" rx="4" fill="#e53e3e" opacity="0.2"/>
  <rect x="310" y="360" width="160" height="20" rx="4" fill="#e53e3e" opacity="0.2"/>
  <circle cx="530" cy="370" r="10" fill="#e53e3e"/>
</svg>
